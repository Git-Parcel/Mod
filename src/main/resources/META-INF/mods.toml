modLoader = "javafml"
loaderVersion = "*"
license = "${license}"
issueTrackerURL = "${issues_url}"

[[mods]]
modId = "${id}"
version = "${version}"
displayName = "${name}"
authors = "${author}"
description = '''${description}'''
logoFile = "${logo_file}"
logoBlur = false

[[dependencies.${ id }]]
modId = "minecraft"
mandatory = true
versionRange = "[${minecraftVersion},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ id }]]
modId = "forge"
mandatory = true
versionRange = "*"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ id }]]
modId = "system_storage_lib"
mandatory = true
versionRange = "[${system_storage_lib_version},)"
ordering = "NONE"
side = "SERVER"
