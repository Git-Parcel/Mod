modLoader = "javafml"
loaderVersion = "${dep.neoforge_loader_version_range}"
license = "${mod.license}"
issueTrackerURL = "${mod.issues_url}"
[[mods]]
modId = "${mod.id}"
version = "${mod.version}"
displayName = "${mod.name}"
displayURL = "${mod.home_url}"
logoFile = "${mod.logo_file}"
credits = "${mod.credits}"
authors = "${mod.author}"
description = '''${mod.description}'''
[[mixins]]
config = "${mod.id}.mixins.json"
[[mixins]]
config = "${mod.id}.neoforge.mixins.json"
[[dependencies.${ mod.id }]]
modId = "neoforge"
type = "required"
versionRange = "[${dep.neoforge_version},)"
ordering = "NONE"
side = "BOTH"
[[dependencies.${ mod.id }]]
modId = "minecraft"
type = "required"
versionRange = "${mod.minecraft_version_range}"
ordering = "NONE"
side = "BOTH"
[[dependencies.${ mod.id }]]
modId = "system_storage_lib"
mandatory = true
versionRange = "[${dep.system_storage_lib_version},)"
ordering = "NONE"
side = "SERVER"
