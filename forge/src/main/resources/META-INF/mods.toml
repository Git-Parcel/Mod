modLoader = "javafml"
loaderVersion = "${dep.forge_loader_version_range}"
license = "${mod.license}"
issueTrackerURL = "${mod.issues_url}"
#clientSideOnly=false
[[mods]]
modId = "${mod.id}"
version = "${mod.version}"
displayName = "${mod.name}"
displayURL = "${mod.home_url}"
logoFile = "${mod.logo_file}"
credits = "${mod.credits}"
authors = "${mod.author}"
description = '''${mod.description}'''
[[dependencies.${ mod.id }]]
modId = "forge"
mandatory = true
versionRange = "[${dep.forge_version},)"
ordering = "NONE"
side = "BOTH"
[[dependencies.${ mod.id }]]
modId = "minecraft"
mandatory = true
versionRange = "${mod.minecraft_version_range}"
ordering = "NONE"
side = "BOTH"
